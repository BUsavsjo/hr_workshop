  <text class="body" x="10" y="87">Du ska du få testa tre olika sätt att använda Copilot. Följ instruktionerna på den här sidan.</text>
  <text class="body" x="10" y="126">Vill du få fler förslag på promptar? Det får du på nästa sida!</text>

