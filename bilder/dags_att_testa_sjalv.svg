<svg xmlns="http://www.w3.org/2000/svg" width="880" height="352" viewBox="0 0 880 352" role="img" aria-labelledby="title desc">
  <title id="title">Dags att testa själv</title>
  <desc id="desc">Instruktionsbild med tre sätt att använda Copilot: som chattfönster, som eget fönster och i Teams.</desc>
  <style>
    .title{font:700 31px Arial, sans-serif;fill:#333}
    .body{font:700 17px Arial, sans-serif;fill:#5a5a5a}
    .line{stroke:#cfcfcf;stroke-width:1;stroke-dasharray:3 3}
    .browser{fill:#f8f8f8;stroke:#777;stroke-width:1.2}
    .bar{fill:#e8e8e8;stroke:#777;stroke-width:1}
    .tab{fill:#f7f7f7;stroke:#777;stroke-width:1}
    .screen-blue{fill:#c9ecfa;stroke:#777;stroke-width:1}
    .panel{fill:#efefef;stroke:#777;stroke-width:1}
    .bubble{fill:#fff;stroke:#777;stroke-width:1}
    .label{font:15px Arial, sans-serif;fill:#111}
    .small{font:700 8px Arial, sans-serif;fill:#333}
    .icon{fill:#fff;stroke:#777;stroke-width:1}
    .red{fill:#f05b46}.yellow{fill:#f6c84f}.blue{fill:#5f84ff}.green{fill:#55b66d}
  </style>

  <text class="title" x="5" y="38">Dags att testa själv!</text>
